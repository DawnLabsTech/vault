services:
  vault-bot:
    build: .
    container_name: vault-bot
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "0.0.0.0:3001:3001"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
